<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InmoYa | Propiedades</title>
    <link rel="stylesheet" href="/css/propiedades.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <button class="hamburger" id="hamburgerBtn">☰</button>

    <aside class="sidebar" id="sidebar">
        <div class="logo"><i class="fa-solid fa-house-chimney"></i> <span>InmoYa</span></div>
        <div class="nav-links">
            <a href="/"><i class="fa-solid fa-home"></i> Inicio</a>
            <a href="/propiedades" class="active"><i class="fa-solid fa-building"></i> Propiedades</a>
            <a href="/agencias"><i class="fa-solid fa-building-user"></i> Agencias</a>
            <a href="/nosotros"><i class="fa-solid fa-users"></i> Nosotros</a>
            <a href="/contacto"><i class="fa-solid fa-envelope"></i> Contacto</a>
        </div>
        <div class="user-profile" id="loginPrompt">
            <div class="user-avatar"><i class="fa-solid fa-user"></i></div>
            <div class="user-info"><strong>Invitado</strong><span>Inicia sesión</span></div>
            <a href="/ingresar" class="btn-logout"><i class="fa-solid fa-arrow-right-to-bracket"></i></a>
        </div>
        <div class="user-profile" id="userProfile" style="display: none;">
            <div class="user-avatar"><i class="fa-solid fa-user"></i></div>
            <div class="user-info"><strong id="userName"></strong><span id="userRole"></span></div>
            <button id="logoutBtn" class="btn-logout"><i class="fa-solid fa-sign-out-alt"></i></button>
        </div>
    </aside>

    <main class="main-content">
        <div class="properties-header">
            <h1>Todas las Propiedades</h1>
            <p>Encuentra la casa o apartamento de tus sueños en todo el país</p>
        </div>
        <div class="grid-properties" id="properties-grid">
            <div class="loading">Cargando propiedades...</div>
        </div>
        <footer>
            <p>&copy; 2026 InmoYa - Tu hogar nos importa</p>
        </footer>
    </main>

    <!-- Modal para detalle de propiedad -->
    <div id="propertyModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body">
                <div class="modal-gallery">
                    <div class="carousel">
                        <div class="carousel-images" id="carouselImages"></div>
                        <button class="carousel-btn prev" id="prevBtn">&#10094;</button>
                        <button class="carousel-btn next" id="nextBtn">&#10095;</button>
                    </div>
                </div>
                <div class="modal-info" id="modalInfo"></div>
            </div>
        </div>
    </div>

    <script src="/js/session.js"></script>
    <script src="/js/propiedades.js"></script>
</body>
</html>
